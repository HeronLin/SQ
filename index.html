<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石器追踪器 - 啉b云端管理版</title>
<style>
/* 核心样式 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #ffffff; --card: #ffffff; --border: #cbd5e1; --fg: #0f172a; --muted: #64748b;
  --primary: #22c55e; --red: #ef4444; --mirror-red: #ff3b30; --purple: #8b5cf6; 
  --blue: #3b82f6; --orange: #f97316; --lightblue: #0ea5e9; --secondary: #f1f5f9; --reset-gray: #94a3b8;
  --pet-height: 90px;
}
html,body { background: var(--bg); color: var(--fg); font-family: sans-serif; height: 100%; width: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; user-select: none; }
#authOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; color:white; }
#authOverlay input { width:300px; padding:15px; border-radius:10px; border:none; margin-bottom:20px; font-size:18px; text-align:center; outline:none; }
#authOverlay button { width:300px; height:50px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:18px; }
.app { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; padding: 5px; }
.header { width: 100%; max-width: 1250px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.title { font-size: 16px; font-weight: 700; color: var(--primary); }
.zoom-container { width: 1300px; display: flex; flex-direction: column; align-items: center; transform-origin: top center; }
.field-container { position: relative; width: 1250px; height: 850px; padding-top: 10px; }
.unit { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.char-block { width: 102px; height: 153px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.06); }
.char-block.selected { border-color: var(--primary); border-width: 4px; box-shadow: 0 0 18px rgba(34,197,94,0.4); }
.mirror-zone { height: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
.mirror-zone.off { background: var(--secondary); color: var(--muted); opacity: 0.4; }
.mirror-zone.on { background: var(--mirror-red); color: white; }
.select-zone { height: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; width: 100%; cursor: pointer; }
.energy-bar { width: 102px; height: 8px; background: var(--secondary); border-radius: 4px; overflow: hidden; margin: 2px 0; }
.energy-fill { height: 100%; transition: width 0.3s; }
.pet { width: 144px; height: var(--pet-height); border-radius: 45px; border: 2.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; background: #fff; cursor: pointer; transition: all 0.2s; }
.pet.on { background: var(--mirror-red) !important; color: white !important; border-color: var(--mirror-red) !important; }
.team-a .unit:nth-child(1) { left: 60px;  top: 255px; } .team-a .unit:nth-child(2) { left: 175px; top: 180px; } 
.team-a .unit:nth-child(3) { left: 290px; top: 105px; } .team-a .unit:nth-child(4) { left: 405px; top: 30px;  }  
.team-a .unit:nth-child(5) { left: 520px; top: -45px; } .team-b .unit:nth-child(1) { left: 490px; top: 595px; } 
.team-b .unit:nth-child(2) { left: 605px; top: 520px; } .team-b .unit:nth-child(3) { left: 720px; top: 445px; } 
.team-b .unit:nth-child(4) { left: 835px; top: 370px; } .team-b .unit:nth-child(5) { left: 950px; top: 295px; }
#adminPanel { position:fixed; top:20px; right:20px; background:white; border:3px solid var(--primary); padding:20px; border-radius:15px; z-index:10000; display:none; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
.controls-area { width: 1250px; padding: 15px; border-top: 1px solid #e2e8f0; background: #fff; margin-top: 30px; }
.skill-panel, .skill-row-2, .bottom-row { display: grid; gap: 12px; margin-bottom: 12px; }
.skill-panel { grid-template-columns: repeat(5, 1fr); }
.skill-row-2 { grid-template-columns: repeat(6, 1fr); }
.bottom-row { grid-template-columns: repeat(3, 1fr); }
.skill-btn { border: none; border-radius: 10px; height: 70px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body onclick="S.clearSelect()">

<div id="authOverlay">
    <h2 style="color:var(--primary);margin-bottom:20px;">系统授权</h2>
    <p style="margin-bottom:10px;opacity:0.8;">您的设备特征码:</p>
    <div id="deviceId" style="background:#334155;padding:10px 20px;border-radius:5px;font-family:monospace;margin-bottom:30px;font-size:24px;">加载中...</div>
    <input type="text" id="authKeyInput" placeholder="输入授权码">
    <button onclick="Auth.doVerify()">解锁系统</button>
</div>

<div id="adminPanel">
    <h3 style="color:var(--primary);">管理后台</h3>
    <input type="text" id="targetId" placeholder="贴入特征码">
    <button onclick="Admin.generate()" style="width:100%; background:var(--primary); color:white; border:none; padding:10px; border-radius:5px;">生成授权码</button>
    <div id="authResult" style="margin-top:10px; padding:10px; background:#f1f5f9; color:var(--red); font-weight:bold;"></div>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="margin-top:10px; width:100%; background:none; border:none; color:gray;">关闭</button>
</div>

<div class="app" id="mainApp" onclick="event.stopPropagation()">
    <div class="header">
        <div class="title">石器追踪器 - 啉b制作</div>
        <div class="status-info">正版已授权</div>
    </div>
    <div class="zoom-container" id="zoomContainer">
        <div class="field-container" id="field">
            <div id="unitLayer"></div>
            <div id="effectLayer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
        </div>
        <div class="controls-area">
            <div class="skill-panel" id="row1"></div>
            <div class="skill-row-2" id="row2"></div>
            <div class="bottom-row" id="row3"></div>
            <p style="text-align:center; color:var(--muted); font-size:12px; margin-top:10px;">连点5下开启后台 | 封号请改云端 blacklist.txt</p>
        </div>
    </div>
</div>

<script>
(function(){
    // --- 核心授权与云端拉黑逻辑 ---
    window.Auth = {
        _S: "LB_STONE_FINAL_2026", 
        // 核心：读取 GitHub 上的黑名单文件
        _BL_URL: "https://raw.githubusercontent.com/heronlin/SQ/main/blacklist.txt",
        
        _GID: () => {
            const d = navigator.userAgent + screen.colorDepth + (navigator.hardwareConcurrency || 4);
            let h = 5381;
            for (let i = 0; i < d.length; i++) h = ((h << 5) + h) + d.charCodeAt(i);
            return Math.abs(h).toString(36).toUpperCase();
        },
        _GK: (id) => {
            let s = id + Auth._S;
            let r = 0;
            for (let i = 0; i < s.length; i++) r = ((r << 5) - r) + s.charCodeAt(i);
            return "LB" + Math.abs(r).toString(16).toUpperCase();
        },
        init: async () => {
            const devId = Auth._GID();
            document.getElementById('deviceId').innerText = devId;

            // 1. 云端拉黑校验
            try {
                const res = await fetch(Auth._BL_URL + '?t=' + Date.now());
                if (res.ok) {
                    const list = await res.text();
                    if (list.split('\n').map(s => s.trim()).includes(devId)) {
                        localStorage.removeItem('_AUTH_OK');
                        document.body.innerHTML = "<div style='background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;'><h2>🚫 设备已被系统锁定</h2><p style='margin-top:10px;opacity:0.6;'>ID: "+devId+"</p></div>";
                        return;
                    }
                }
            } catch (e) { console.warn("云端校验跳过"); }

            // 2. 本地授权校验
            if(localStorage.getItem('_AUTH_OK') === Auth._GK(devId)) {
                document.getElementById('mainApp').style.display = 'flex';
                window.dispatchEvent(new Event('resize'));
                render();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        },
        doVerify: () => {
            const input = document.getElementById('authKeyInput').value.trim().toUpperCase();
            if(input === Auth._GK(Auth._GID())) {
                localStorage.setItem('_AUTH_OK', input);
                location.reload();
            } else { alert("授权码错误"); }
        }
    };

    // --- 管理器与战场逻辑 ---
    let clicks = 0;
    window.Admin = {
        show: () => { if(prompt("管理密码") === "666666") document.getElementById('adminPanel').style.display = 'block'; },
        generate: () => { const tid = document.getElementById('targetId').value.trim().toUpperCase(); document.getElementById('authResult').innerText = tid ? Auth._GK(tid) : "输入特征码"; }
    };
    document.addEventListener('click', () => { clicks++; setTimeout(()=>clicks=0, 1500); if(clicks>=5) Admin.show(); });
    document.addEventListener('keydown', e => { if(e.key.toLowerCase()==='m') Admin.show(); });

    let units=[], selectedId=null, history=[], scale=1;
    const initData = () => { units=[]; for(let i=0;i<10;i++) units.push({id:i, team:i<5?'top':'bottom', energy:100, mirror:false, petMirror:false}); };
    initData();

    const render = () => {
        const layer = document.getElementById('unitLayer');
        let html = '<div class="team-a" style="display:contents">';
        units.forEach((u, i) => {
            const isSel = selectedId === u.id;
            const content = `
                ${u.team==='top'?'<div class="energy-bar"><div class="energy-fill" style="width:'+u.energy+'%; background:'+(u.energy>18?'var(--primary)':'var(--red)')+'"></div></div>':''}
                <div class="char-block ${isSel?'selected':''}">
                    ${u.team==='top' ? `<div class="select-zone" onclick="S.select(${u.id})">${u.energy}</div><div class="mirror-zone ${u.mirror?'on':'off'}" onclick="S.mirror(${u.id})">镜</div>` : 
                    `<div class="mirror-zone ${u.mirror?'on':'off'}" onclick="S.mirror(${u.id})">镜</div><div class="select-zone" onclick="S.select(${u.id})">${u.energy}</div>`}
                </div>
                <div class="pet ${u.petMirror?'on':''}" onclick="S.petMirror(${u.id})">${u.id<5?'A'+(i+1):'B'+(i-4)}</div>
                ${u.team==='bottom'?'<div class="energy-bar"><div class="energy-fill" style="width:'+u.energy+'%; background:'+(u.energy>18?'var(--primary)':'var(--red)')+'"></div></div>':''}
            `;
            html += `<div class="unit" id="unit-${u.id}" style="width:144px;">${content}</div>`;
            if(i === 4) html += '</div><div class="team-b" style="display:contents">';
        });
        layer.innerHTML = html + '</div>';

        const r1 = [{l:'精灵',c:8},{l:'极转',c:18,cls:'purple'},{l:'全医',c:16},{l:'镜像',c:4},{l:'口袋',c:3}];
        const r2 = [{l:'黑滋',c:24},{l:'黑恩',c:40,cls:'blue'},{l:'光滋',c:17},{l:'光恩',c:28},{l:'灵力',c:30,cls:'orange'},{l:'光灵',c:21,cls:'lightblue'}];
        document.getElementById('row1').innerHTML = r1.map((s,i)=>`<button class="skill-btn" style="background:${s.cls?'var(--'+s.cls+')':'#64748b'}" onclick="S.skill(${s.c})"><span style="font-size:30px;font-weight:900">${i+1} ${s.l}</span><span style="font-size:20px;margin-left:8px;opacity:0.8">-${s.c}</span></button>`).join('');
        document.getElementById('row2').innerHTML = r2.map((s,i)=>`<button class="skill-btn" style="background:${s.cls?'var(--'+s.cls+')':'#64748b'}" onclick="S.skill(${s.c})"><span style="font-size:30px;font-weight:900">${i+6} ${s.l}</span><span style="font-size:20px;margin-left:8px;opacity:0.8">-${s.c}</span></button>`).join('');
        document.getElementById('row3').innerHTML = `<button class="skill-btn" style="background:var(--primary)" onclick="S.fill()">Q 补满气量</button><button class="skill-btn" style="background:var(--reset-gray)" onclick="S.reset()">R 全部重置</button><button class="skill-btn" style="background:var(--reset-gray)" onclick="S.undo()">Z 撤销一步</button>`;
    };

    window.S = {
        select: id => { selectedId = (selectedId===id?null:id); render(); },
        clearSelect: () => { if(selectedId!==null){selectedId=null; render();} },
        mirror: id => { history.push(JSON.stringify(units)); units[id].mirror=!units[id].mirror; render(); },
        petMirror: id => { history.push(JSON.stringify(units)); units[id].petMirror=!units[id].petMirror; render(); },
        skill: cost => { if(selectedId!==null){ history.push(JSON.stringify(units)); units[selectedId].energy=Math.max(0,units[selectedId].energy-cost); selectedId=null; render(); } },
        fill: () => { if(selectedId!==null){ history.push(JSON.stringify(units)); units[selectedId].energy=100; selectedId=null; render(); } },
        undo: () => { if(history.length){ units=JSON.parse(history.pop()); render(); } },
        reset: () => { if(confirm("重置战场？")){ initData(); render(); } }
    };

    window.addEventListener('resize', () => { scale=Math.min(Math.max(window.innerWidth/1300, 0.3), 1.5); document.getElementById('zoomContainer').style.transform=`scale(${scale})`; });
    window.addEventListener('load', Auth.init);
    document.addEventListener('keydown', e => { const k=e.key.toLowerCase(); if(k==='z') S.undo(); else if(k==='q') S.fill(); else if(k==='r') S.reset(); });
})();
</script>
</body>
</html>
